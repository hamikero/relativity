<script>(() => {
  const W = 675, H = 900;
  const MAX_TILT = Math.PI / 10.5;
  const BEAM_W = 560, BEAM_H = 150, PAN_W = 230, PAN_H = 110;
  const LAYERS = window.FB_LAYERS;
  const canvas = document.getElementById('art');
  const ctx = canvas.getContext('2d');
  canvas.width = W;
  canvas.height = H;

  const imgs = {};
  let loaded = 0;
  let records = [];
  let glyphs = [];
  let pointer = {x: W/2, y: H/2, active: false, inside:false};
  let tilt = 0;
  let hoverGlyph = null;
  let showText = false;
  let alarmPhase = 0;
  let frame = 0;
  let pivot, leftEnd, rightEnd, leftPan, rightPan;

  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  function boot() {
    for (const [k, src] of Object.entries(LAYERS)) {
      const img = new Image();
      img.onload = () => { loaded++; if (loaded === Object.keys(LAYERS).length) init(); };
      img.src = src;
      imgs[k] = img;
    }
  }

  function init() {
    updateBalance();
    records = (window.INEQUALITY_DATA || []).map((d, i) => {
      const iso = String(d.iso3 || d.iso || d.codeLabel || 'GLB').toUpperCase();
      const cur = currencyForIso(iso);
      return {
        iso,
        country: String(d.country || d.shortLabel || '未知国家或地区'),
        short: String(d.shortLabel || d.country || iso),
        code: String(d.codeLabel || iso),
        value: Number(d.value) || 0,
        score: clamp(Number(d.score) || 0, 0, 1),
        year: Number(d.year) || 0,
        source: String(d.sourceFile || d.source_file || `record_${i}`),
        symbol: cur.symbol,
        currency: cur.name,
        kind: cur.kind
      };
    });
    rebuildGlyphs();
    resize();
    bindEvents();
    requestAnimationFrame(draw);
  }

  function bindEvents() {
    window.addEventListener('resize', resize);
    canvas.addEventListener('pointermove', e => {
      const r = canvas.getBoundingClientRect();
      pointer.x = clamp((e.clientX - r.left) / r.width * W, 0, W);
      pointer.y = clamp((e.clientY - r.top) / r.height * H, 0, H);
      pointer.active = true; pointer.inside = true;
    });
    canvas.addEventListener('pointerleave', () => { pointer.inside = false; });
    canvas.addEventListener('pointerdown', e => { pointer.active = true; });
    window.addEventListener('keydown', e => {
      if (e.key === 's' || e.key === 'S') {
        const a = document.createElement('a');
        a.download = '流动的天平_图层交互版.png';
        a.href = canvas.toDataURL('image/png');
        a.click();
      }
      if (e.key === 't' || e.key === 'T') showText = !showText;
      if (e.key === 'r' || e.key === 'R') rebuildGlyphs();
    });
  }

  function resize() {
    const maxW = Math.max(320, window.innerWidth - 24);
    const maxH = Math.max(430, window.innerHeight - 72);
    const fit = Math.min(1, maxW / W, maxH / H);
    canvas.style.width = `${Math.floor(W * fit)}px`;
    canvas.style.height = `${Math.floor(H * fit)}px`;
  }

  function rebuildGlyphs() {
    glyphs = [];
    for (let i = 0; i < records.length; i++) glyphs.push(new Glyph(records[i], i, false));
    for (let i = records.length; i < 480 && records.length; i++) glyphs.push(new Glyph(records[i % records.length], i, true));
  }

  function updateBalance() {
    pivot = {x: W * 0.5, y: 238};
    const active = pointer.active && pointer.inside;
    const x = active ? pointer.x : W * 0.5;
    const centerDist = Math.abs(x - W*0.5) / (W*0.5);
    const dz = smoothstep(0.04, 0.20, centerDist);
    const target = map(x, 0, W, MAX_TILT, -MAX_TILT) * dz;
    tilt = lerp(tilt, target, 0.045);
    const half = 259;
    const c = Math.cos(tilt), s = Math.sin(tilt);
    leftEnd = {x: pivot.x - c * half, y: pivot.y + s * half};
    rightEnd = {x: pivot.x + c * half, y: pivot.y - s * half};
    const stringLen = 184;
    leftPan = {x: leftEnd.x, y: leftEnd.y + stringLen};
    rightPan = {x: rightEnd.x, y: rightEnd.y + stringLen};
  }

  function draw() {
    frame++;
    updateBalance();
    ctx.clearRect(0,0,W,H);
    ctx.globalCompositeOperation = 'source-over';
    ctx.drawImage(imgs.bg, 0, 0, W, H);
    drawSubtleHud();

    ctx.globalCompositeOperation = 'lighter';
    ctx.drawImage(imgs.backRails, 0, 0, W, H);
    drawParticles(false);
    ctx.drawImage(imgs.pillar, 0, 0, W, H);
    drawDynamicBalance();
    drawParticles(true);
    ctx.drawImage(imgs.frontRails, 0, 0, W, H);
    drawAlarm();

    ctx.globalCompositeOperation = 'source-over';
    updateHover();
    if (showText) drawUI();
    drawHoverCard();
    requestAnimationFrame(draw);
  }

  function drawDynamicBalance() {
    // suspension lines behind pans
    ctx.save();
    ctx.globalAlpha = 0.82;
    drawSuspension(leftEnd, leftPan);
    drawSuspension(rightEnd, rightPan);
    ctx.restore();

    // rotating beam image
    ctx.save();
    ctx.translate(pivot.x, pivot.y);
    ctx.rotate(tilt);
    glowImage(imgs.beam, -BEAM_W/2, -BEAM_H/2, BEAM_W, BEAM_H, 1.0);
    ctx.restore();

    // pans remain horizontal, follow endpoints
    drawPanImage(leftPan);
    drawPanImage(rightPan);

    // bright balance pivots
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    circle(pivot.x,pivot.y,16,'rgba(235,248,255,.42)',1.1);
    circle(pivot.x,pivot.y,4,'rgba(255,209,145,.85)',0);
    ctx.restore();
  }

  function drawSuspension(end, pan) {
    ctx.save();
    ctx.strokeStyle = 'rgba(222,238,246,.50)';
    ctx.lineWidth = 0.75;
    const offsets = [-0.42, 0, 0.42];
    for (const off of offsets) {
      ctx.beginPath();
      ctx.moveTo(end.x, end.y);
      ctx.lineTo(pan.x + off * 96, pan.y - 2);
      ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(180,205,218,.22)';
    for (let i=0;i<12;i++) {
      const t=i/11; const x=lerp(end.x,pan.x,t); const y=lerp(end.y,pan.y,t);
      ctx.beginPath(); ctx.arc(x,y, i%3===0?1.4:.7,0,Math.PI*2); ctx.stroke();
    }
    ctx.restore();
  }

  function drawPanImage(p) {
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    glowImage(imgs.pan, p.x-PAN_W/2, p.y-PAN_H/2, PAN_W, PAN_H, 1.0);
    ctx.restore();
  }

  function glowImage(img, x, y, w, h, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = 'rgba(200,230,245,.22)';
    ctx.shadowBlur = 11;
    ctx.drawImage(img, x, y, w, h);
    ctx.restore();
  }

  function drawParticles(front) {
    const list = glyphs.filter(g => front ? g.z >= -0.06 : g.z < 0.08);
    list.sort((a,b)=>a.z-b.z);
    for (const g of list) { g.update(); g.draw(); }
  }

  class Glyph {
    constructor(datum, index, clone) {
      this.d = datum; this.index = index; this.clone = clone;
      this.phase = rand(index*99+7);
      this.lane = rand(index*31+5)*2-1;
      this.side = rand(index*17+3) < .5 ? -1 : 1;
      this.seed = rand(index*101+11)*1000;
      this.size = lerp(4.4, 12.6, Math.pow(this.d.score, .68));
      this.speed = lerp(.00135, .00043, this.d.score) * lerp(.82,1.18,rand(index*73+1));
      this.rot = rand(index*11+9) * Math.PI * 2;
      this.rotSpeed = lerp(-.012,.012,rand(index*23+4));
      this.chooseSide();
      const p = flowPoint(this.phase, this.side, this.lane, this.d.score, this.seed);
      this.x=p.x; this.y=p.y; this.px=p.x; this.py=p.y; this.z=p.z;
    }
    chooseSide() {
      const lower = tilt > 0 ? -1 : tilt < 0 ? 1 : (rand(this.index+frame*.001)<.5?-1:1);
      this.side = rand(this.index*13 + Math.floor(frame*.01)) < lerp(.50,.86,this.d.score) ? lower : -lower;
    }
    update() {
      this.px=this.x; this.py=this.y;
      const imbalance = clamp(Math.abs(tilt)/MAX_TILT,0,1);
      const lower = tilt > 0 ? -1 : 1;
      const resistance = this.side === lower ? lerp(1,.30, imbalance*this.d.score) : 1;
      this.phase += this.speed * resistance;
      this.rot += this.rotSpeed * resistance;
      if (this.phase >= 1) { this.phase -= 1; this.chooseSide(); }
      const p = flowPoint(this.phase, this.side, this.lane, this.d.score, this.seed);
      this.x = lerp(this.x, p.x, .28); this.y = lerp(this.y, p.y, .28); this.z = p.z;
    }
    draw() {
      const front = map(this.z, -1, 1, .68, 1.2);
      const s = this.size * front;
      const a = lerp(.24,.92,this.d.score)*front;
      ctx.save();
      ctx.globalCompositeOperation='lighter';
      ctx.strokeStyle = `rgba(185,215,230,${a*.22})`;
      ctx.lineWidth = Math.max(.35, s*.09);
      ctx.beginPath(); ctx.moveTo(this.px,this.py); ctx.lineTo(this.x,this.y); ctx.stroke();
      ctx.translate(this.x,this.y); ctx.rotate(this.rot + this.z*.10);
      drawCurrency(this.d, s, a);
      ctx.restore();
    }
  }

  function flowPoint(u, side, lane, score, seed) {
    u = ((u % 1)+1)%1;
    const end = side < 0 ? leftEnd : rightEnd;
    const pan = side < 0 ? leftPan : rightPan;
    let x,y,z=0;
    if (u < .12) {
      const t=u/.12, a=-Math.PI/2+Math.PI*2*1.4*t+lane*.18;
      x=W/2+Math.cos(a)*68; y=82+Math.sin(a)*13; z=Math.sin(a);
    } else if (u < .27) {
      const t=(u-.12)/.15;
      const p=bezier({x:W/2,y:94},{x:W/2+side*160,y:118},{x:W/2-side*95,y:175},pivot,t);
      const swirl=Math.sin(Math.PI*2*(2.2*t+lane+seed*.001))*Math.sin(Math.PI*t);
      x=p.x+swirl*lerp(6,22,score); y=p.y; z=swirl;
    } else if (u < .40) {
      const t=(u-.27)/.13; const e=smoothstep(0,1,t);
      x=lerp(pivot.x,end.x,e); y=lerp(pivot.y,end.y,e)+Math.sin(t*Math.PI*2+lane)*2; z=Math.sin(t*Math.PI*2+lane);
    } else if (u < .52) {
      const t=(u-.40)/.12;
      const wave=Math.sin(Math.PI*2*(2*t+lane));
      x=lerp(end.x,pan.x,t)+wave*1.6; y=lerp(end.y,pan.y,t); z=wave;
    } else if (u < .65) {
      const t=(u-.52)/.13, a=-Math.PI/2+Math.PI*2*1.7*t+lane;
      x=pan.x+Math.cos(a)*98; y=pan.y+Math.sin(a)*18; z=Math.sin(a);
    } else if (u < .86) {
      const t=(u-.65)/.21;
      const env=Math.sin(Math.PI*t), r=(42+182*env)*(1+score*.04);
      const a=Math.PI*2*2.55*t+(side<0?Math.PI:0)+lane*.25;
      x=lerp(pan.x,W/2,t)+Math.cos(a)*r*.75;
      y=lerp(pan.y,808,t)+Math.sin(a)*19;
      z=Math.sin(a);
    } else {
      const t=(u-.86)/.14, env=Math.sin(Math.PI*t), a=Math.PI*2*(2.5+score)*t+lane+seed*.001;
      x=lerp(W/2,W/2,smoothstep(0,1,t))+Math.cos(a)*lerp(18,48,score)*env;
      y=lerp(808,82,smoothstep(0,1,t))+Math.sin(a)*8*env;
      z=Math.sin(a);
    }
    return {x,y,z};
  }

  function drawCurrency(d,s,a) {
    ctx.save();
    const main = d.score > .72 ? `rgba(255,218,160,${a})` : `rgba(228,242,248,${a})`;
    const red = `rgba(255,54,45,${a*.22})`;
    const cyan = `rgba(0,178,255,${a*.20})`;
    ctx.translate(1.15,0); drawCurrencyShape(d,s,red);
    ctx.translate(-2.3,.65); drawCurrencyShape(d,s,cyan);
    ctx.translate(1.15,-.65); drawCurrencyShape(d,s,main);
    ctx.restore();
  }
  function drawCurrencyShape(d,s,color) {
    ctx.save();
    ctx.strokeStyle=color; ctx.fillStyle=color; ctx.lineWidth=Math.max(.55,s*.075);
    ctx.beginPath();
    if (d.kind === 'note') {
      roundRect(-s*.68,-s*.38,s*1.36,s*.76,s*.10); ctx.stroke();
      roundRect(-s*.48,-s*.25,s*.96,s*.50,s*.08); ctx.stroke();
    } else if (d.kind === 'squareCoin') {
      ctx.arc(0,0,s*.58,0,Math.PI*2); ctx.stroke(); roundRect(-s*.17,-s*.17,s*.34,s*.34,s*.03); ctx.stroke();
    } else {
      ctx.arc(0,0,s*.58,0,Math.PI*2); ctx.stroke(); ctx.beginPath(); ctx.arc(0,0,s*.42,0,Math.PI*2); ctx.stroke();
    }
    ctx.font = `bold ${Math.max(5.5,s*.48)}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(d.symbol,0,0.5);
    ctx.restore();
  }

  function roundRect(x,y,w,h,r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
  }

  function updateHover() {
    hoverGlyph = null;
    if (!pointer.active || !pointer.inside) return;
    let best=Infinity;
    for (const g of glyphs) {
      if (g.clone) continue;
      const r=Math.max(16,g.size*2.0);
      const d2=(pointer.x-g.x)**2+(pointer.y-g.y)**2;
      if (d2<r*r && d2<best) { best=d2; hoverGlyph=g; }
    }
  }

  function drawHoverCard() {
    if (!hoverGlyph) return;
    const g=hoverGlyph, d=g.d;
    let x=g.x+18,y=g.y-52,w=214,h=92;
    if (x+w>W-16) x=g.x-w-18;
    x=clamp(x,14,W-w-14); y=clamp(y,92,H-h-58);
    ctx.save();
    ctx.strokeStyle='rgba(238,248,252,.72)'; ctx.lineWidth=.9; ctx.globalCompositeOperation='lighter';
    ctx.beginPath(); ctx.arc(g.x,g.y,g.size*1.9,0,Math.PI*2); ctx.stroke();
    ctx.globalCompositeOperation='source-over';
    ctx.strokeStyle='rgba(196,220,232,.62)'; ctx.beginPath(); ctx.moveTo(g.x,g.y); ctx.lineTo(x<g.x?x+w:x,clamp(g.y,y+10,y+h-10)); ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,.84)'; roundRect(x,y,w,h,8); ctx.fill();
    ctx.strokeStyle='rgba(200,225,236,.28)'; ctx.stroke();
    ctx.fillStyle='rgba(240,247,250,.95)'; ctx.font='bold 13px Arial, Microsoft YaHei'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText(d.country,x+10,y+9);
    ctx.font='9px Arial, Microsoft YaHei'; ctx.fillStyle='rgba(255,215,155,.88)'; ctx.fillText(`对应货币：${d.currency}（${d.symbol}）`,x+10,y+31);
    ctx.fillStyle='rgba(195,218,228,.86)'; ctx.fillText(`年份：${d.year||'—'}　原始数值：${format(d.value)}`,x+10,y+50);
    ctx.fillText(`差距强度：${Math.round(d.score*100)}%　代码：${d.code}`,x+10,y+68);
    ctx.restore();
  }

  function drawUI() {
    ctx.save();
    ctx.fillStyle='rgba(232,240,245,.92)'; ctx.font='bold 25px Arial, Microsoft YaHei'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText('流动的天平',28,24);
    ctx.font='8.2px Arial'; ctx.fillStyle='rgba(175,198,210,.76)'; ctx.fillText('FLOWING BALANCE · LAYERED REAL-TIME SYSTEM',29,55);
    ctx.font='7.2px Arial, Microsoft YaHei'; ctx.fillStyle='rgba(130,154,168,.74)'; ctx.fillText('高精度图层 + 实时货币交互 · 悬停查看国家数据',29,70);
    drawPanel(23,110,122,112,'图层系统', [
      ['背景/圆环','PNG'], ['横梁/托盘','实时旋转'], ['货币符号', String(records.length)], ['遮挡轨道','前/后景']
    ]);
    drawPanel(W-145,110,122,112,'平衡读数', [
      ['倾斜幅度', `${Math.round(Math.abs(tilt)/MAX_TILT*100)}%`], ['左盘状态', tilt>0.02?'下沉':'—'], ['右盘状态', tilt<-0.02?'下沉':'—'], ['交互模式','鼠标/触控']
    ]);
    drawPanel(23,245,122,118,'货币图例', [['￥','人民币'], ['$','美元体系'], ['€','欧元体系'], ['¤','本地货币']]);
    drawPanel(W-145,245,122,118,'数据说明', [['符号越大','差距越高'], ['流速越慢','聚集越强'], ['偏色越强','系统摩擦'], ['悬停符号','查看国家']]);
    drawMiniCharts();
    ctx.fillStyle='rgba(214,228,235,.86)'; ctx.font='8.4px Arial, Microsoft YaHei'; ctx.textAlign='left'; ctx.textBaseline='bottom'; ctx.fillText('财富本身并非原罪，停止流动才是灾难的开始。',28,H-18);
    ctx.textAlign='right'; ctx.fillStyle='rgba(135,160,174,.72)'; ctx.fillText(`${records.length} 条中文数据 · 3:4 独立HTML`,W-28,H-18);
    ctx.restore();
  }

  function drawPanel(x,y,w,h,title,rows){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,.42)'; roundRect(x,y,w,h,3); ctx.fill(); ctx.strokeStyle='rgba(185,210,222,.18)'; ctx.lineWidth=.6; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y+18); ctx.lineTo(x+w,y+18); ctx.stroke();
    ctx.fillStyle='rgba(165,190,204,.75)'; ctx.font='bold 7px Arial, Microsoft YaHei'; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText(title,x+7,y+6);
    ctx.font='7.2px Arial, Microsoft YaHei';
    rows.forEach((r,i)=>{ const yy=y+28+i*19; ctx.fillStyle='rgba(130,154,166,.75)'; ctx.textAlign='left'; ctx.fillText(r[0],x+8,yy); ctx.fillStyle='rgba(225,237,243,.84)'; ctx.textAlign='right'; ctx.fillText(r[1],x+w-8,yy); });
    ctx.restore();
  }
  function drawMiniCharts(){
    const y=790; ctx.save(); ctx.strokeStyle='rgba(180,205,218,.20)'; ctx.beginPath(); ctx.moveTo(24,y); ctx.lineTo(W-24,y); ctx.stroke();
    for(let j=0;j<3;j++){ const x=28+j*220; const w=178,h=48; ctx.fillStyle='rgba(150,175,188,.68)'; ctx.font='7px Arial, Microsoft YaHei'; ctx.fillText(['强度分布','流动频谱','相位轨迹'][j],x,y+12); ctx.strokeStyle='rgba(218,232,238,.40)'; ctx.lineWidth=.55; ctx.beginPath(); for(let i=0;i<=56;i++){ const t=i/56; const yy=y+64-(10+(Math.sin(t*Math.PI*2*(1.5+j*.5)+frame*.015)+1)*.5*32*(.4+.6*noiseLike(i,j))); if(i===0)ctx.moveTo(x+t*w,yy); else ctx.lineTo(x+t*w,yy);} ctx.stroke(); }
    ctx.restore();
  }

  function drawSubtleHud(){
    ctx.save(); ctx.strokeStyle='rgba(190,210,220,.12)'; ctx.lineWidth=.55; ctx.strokeRect(14,14,W-28,H-28); ctx.restore();
  }

  function drawAlarm(){
    const im=clamp(Math.abs(tilt)/MAX_TILT,0,1); if(im<.72) return; alarmPhase+=.022;
    const pan=tilt>0?leftPan:rightPan; ctx.save(); ctx.globalCompositeOperation='lighter'; ctx.strokeStyle=`rgba(255,75,40,${(im-.72)*.55})`; ctx.lineWidth=1;
    for(let i=0;i<3;i++){ const p=(alarmPhase+i/3)%1; ctx.beginPath(); ctx.ellipse(pan.x,pan.y,110*(1+p*.85),18*(1+p*3.5),0,0,Math.PI*2); ctx.stroke(); }
    ctx.restore();
  }

  function circle(x,y,r,style,width){ ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); if(width){ ctx.strokeStyle=style; ctx.lineWidth=width; ctx.stroke(); } else { ctx.fillStyle=style; ctx.fill(); } }
  function bezier(p0,p1,p2,p3,t){ const mt=1-t; return {x:mt*mt*mt*p0.x+3*mt*mt*t*p1.x+3*mt*t*t*p2.x+t*t*t*p3.x, y:mt*mt*mt*p0.y+3*mt*mt*t*p1.y+3*mt*t*t*p2.y+t*t*t*p3.y}; }
  function lerp(a,b,t){return a+(b-a)*t} function clamp(v,a,b){return Math.max(a,Math.min(b,v))} function map(v,a,b,c,d){return c+(d-c)*((v-a)/(b-a))}
  function smoothstep(a,b,x){const t=clamp((x-a)/(b-a),0,1); return t*t*(3-2*t)}
  function rand(seed){ const x=Math.sin(seed*12.9898)*43758.5453123; return x-Math.floor(x); }
  function noiseLike(i,j){ return rand(i*37+j*101); }
  function format(v){ return new Intl.NumberFormat('zh-CN',{maximumFractionDigits:2}).format(v); }

  function currencyForIso(iso) {
    const euro = new Set(['AUT','BEL','HRV','CYP','EST','FIN','FRA','DEU','GRC','IRL','ITA','LVA','LTU','LUX','MLT','NLD','PRT','SVK','SVN','ESP','AND','MCO','SMR','VAT','MNE','XKX']);
    const usd = new Set(['USA','ECU','SLV','PAN','TLS','MHL','FSM','PLW','ZWE','PRI','GUM','VIR','ASM','MNP','BES','CUW','SXM','TCA','VGB']);
    if (euro.has(iso)) return { symbol: '€', name: '欧元', kind: 'coin' };
    if (usd.has(iso)) return { symbol: '$', name: '美元', kind: 'note' };
    const map = {
      CHN:['￥','人民币','squareCoin'], HKG:['HK$','港元','note'], MAC:['MOP$','澳门元','note'], TWN:['NT$','新台币','note'],
      JPN:['¥','日元','coin'], GBR:['£','英镑','note'], IND:['₹','印度卢比','coin'], RUS:['₽','俄罗斯卢布','coin'], KOR:['₩','韩元','coin'], BRA:['R$','巴西雷亚尔','note'], ZAF:['R','南非兰特','note'], MEX:['$','墨西哥比索','coin'], TUR:['₺','土耳其里拉','coin'], CAN:['C$','加拿大元','note'], AUS:['A$','澳大利亚元','note'], NZL:['NZ$','新西兰元','note'], CHE:['CHF','瑞士法郎','note'], NOR:['kr','挪威克朗','coin'], SWE:['kr','瑞典克朗','coin'], DNK:['kr','丹麦克朗','coin'], POL:['zł','波兰兹罗提','coin'], IDN:['Rp','印尼卢比','note'], MYS:['RM','马来西亚林吉特','note'], SGD:['S$','新加坡元','note'], THA:['฿','泰铢','coin'], VNM:['₫','越南盾','note'], PHL:['₱','菲律宾比索','coin'], EGY:['£','埃及镑','note'], NGN:['₦','尼日利亚奈拉','note'], ARG:['$','阿根廷比索','note'], CHL:['$','智利比索','coin'], COL:['$','哥伦比亚比索','coin'], PER:['S/','秘鲁索尔','coin'], SAU:['﷼','沙特里亚尔','note'], ARE:['د.إ','阿联酋迪拉姆','note']
    };
    const m = map[iso]; if (m) return {symbol:m[0],name:m[1],kind:m[2]};
    return { symbol: '¤', name: '本地货币', kind: 'coin' };
  }
  boot();
})();
</script>
