<script>
(()=>{
'use strict';
const 宽=675,高=900,圆周=Math.PI*2,像素上限=2;
const 中心X=宽/2,中心Y=442,主倾角=-0.60;
const 画布=document.getElementById('画布');
const 笔=画布.getContext('2d',{alpha:false,desynchronized:true});
const 轨迹画布=document.createElement('canvas');
const 轨迹笔=轨迹画布.getContext('2d',{alpha:true,desynchronized:true});
const 语言中文={"ar":"阿拉伯语","az":"阿塞拜疆语","da":"丹麦语","de":"德语","el":"希腊语","en":"英语","es":"西班牙语","et":"爱沙尼亚语","fa":"波斯语","fi":"芬兰语","fr":"法语","hr":"克罗地亚语","hu":"匈牙利语","hy":"亚美尼亚语","is":"冰岛语","it":"意大利语","ja":"日语","lt":"立陶宛语","lv":"拉脱维亚语","mk":"马其顿语","nl":"荷兰语","nn":"新挪威语","no":"挪威语","pl":"波兰语","pt":"葡萄牙语","ru":"俄语","sl":"斯洛文尼亚语","sr":"塞尔维亚语","sv":"瑞典语","tr":"土耳其语","uk":"乌克兰语","ur":"乌尔都语","zh":"中文"};
const 语系中文={"Afro-Asiatic":"亚非语系","Indo-European":"印欧语系","Uralic":"乌拉尔语系","Japonic":"日本语系","Turkic":"突厥语系","Sino-Tibetan":"汉藏语系"};
const 数据=(window.LANGUAGE_DATA||[]).map((项,序)=>({...项,中文:语言中文[项.code]||'未知语言',语系中文:语系中文[项.family]||'未分类语系',序}));
let 像素比=1,时间=0,上次时间=performance.now(),暂停=false,显示文字=false,静音=false;
let 声音上下文=null,声音已唤醒=false,最近发声=-1,最近发声时间=0,下一次碰撞=.45,帧数=0;
let 指针={x:中心X,y:中心Y,前x:中心X,前y:中心Y,速度:0,按下:false,进入:false};
let 当前星点=null,提示星点=null,提示消失时间=0;
const 随机=随机生成器(20260629);

function 调整尺寸(){
  像素比=Math.min(像素上限,window.devicePixelRatio||1);
  画布.width=Math.round(宽*像素比);画布.height=Math.round(高*像素比);
  轨迹画布.width=画布.width;轨迹画布.height=画布.height;
  画布.style.aspectRatio=`${宽}/${高}`;
  笔.setTransform(像素比,0,0,像素比,0,0);
  轨迹笔.setTransform(像素比,0,0,像素比,0,0);
  笔.imageSmoothingEnabled=true;轨迹笔.imageSmoothingEnabled=true;
  笔.fillStyle='#000';笔.fillRect(0,0,宽,高);
  轨迹笔.clearRect(0,0,宽,高);
}

const 星点=[];
const 放射束=[];
let 星点编号=0;
function 加入星点(种类,数量){
  for(let i=0;i<数量;i++){
    const 语言序=星点编号%Math.max(1,数据.length);
    const 语言=数据[语言序]||{};
    const 星={
      编号:星点编号++,种类,语言序,
      角:随机()*圆周,相位:随机()*圆周,
      速度:(.012+随机()*.055)*(随机()<.5?-1:1),
      轨道半径:100,扁率:.62,倾角:主倾角,厚度:0,
      大小:.25+随机()*1.25,亮度:.25+随机()*.75,
      x:中心X,y:中心Y,前x:中心X,前y:中心Y,
      深度:.5,闪烁:0,切x:1,切y:0,花瓣偏:随机()*圆周,花瓣权重:.65+随机()*.72
    };
    if(种类==='核心'){
      星.轨道半径=6+Math.pow(随机(),1.55)*100;
      星.扁率=.68+随机()*.36;
      星.倾角=主倾角+(随机()-.5)*1.15;
      星.厚度=4+随机()*17;
      星.速度=(.055+随机()*.15)*(随机()<.5?-1:1)*(1+(语言.onset_rate||5)/38);
      星.大小=.25+随机()*1.25;
      星.亮度=.35+随机()*.65;
    }else if(种类==='内环'){
      星.轨道半径=92+随机()*78;
      星.扁率=.50+随机()*.22;
      星.倾角=主倾角+(随机()-.5)*.20;
      星.厚度=4+随机()*18;
      星.速度=(.026+随机()*.075)*(随机()<.5?-1:1);
      星.大小=.28+随机()*1.2;
    }else if(种类==='主环'){
      星.轨道半径=154+随机()*122;
      星.扁率=.46+随机()*.18;
      星.倾角=主倾角+(随机()-.5)*.14;
      星.厚度=5+随机()*31;
      星.速度=(.014+随机()*.052)*(随机()<.5?-1:1);
      星.大小=.25+随机()*1.45;
    }else if(种类==='外环'){
      星.轨道半径=238+randomPow(.72)*112;
      星.扁率=.50+随机()*.22;
      星.倾角=主倾角+(随机()-.5)*.34;
      星.厚度=8+随机()*40;
      星.速度=(.009+随机()*.036)*(随机()<.5?-1:1);
      星.大小=.22+随机()*1.2;
      星.亮度=.18+随机()*.56;
    }else if(种类==='流线'){
      星.轨道半径=120+随机()*260;
      星.扁率=.44+随机()*.25;
      星.倾角=主倾角+(随机()-.5)*.5;
      星.厚度=2+随机()*15;
      星.速度=(.012+随机()*.045)*(随机()<.5?-1:1);
      星.大小=.18+随机()*.82;
      星.亮度=.18+随机()*.6;
    }else{
      星.x=14+随机()*(宽-28);星.y=88+随机()*(高-166);
      星.前x=星.x;星.前y=星.y;星.大小=.18+随机()*.75;星.亮度=.12+随机()*.5;
    }
    星点.push(星);
  }

const 波纹=[];const 碎线=[];const 碰撞=[];const 语言脉冲=Array.from({length:数据.length},()=>0);
const 音频缓存=new Map();

async function 唤醒声音(){
  if(!声音上下文){
    const 构造器=window.AudioContext||window.webkitAudioContext;
    if(!构造器)return;
    声音上下文=new 构造器();
  }
  try{await 声音上下文.resume();声音已唤醒=true;}catch(_){ }
}
async function 取得音频(代码){
  if(音频缓存.has(代码))return 音频缓存.get(代码);
  const 地址=window.AUDIO_DATA&&window.AUDIO_DATA[代码];
  if(!地址||!声音上下文)return null;
  const 承诺=fetch(地址).then(r=>r.arrayBuffer()).then(b=>声音上下文.decodeAudioData(b.slice(0))).catch(()=>null);
  音频缓存.set(代码,承诺);
  return 承诺;
}
async function 播放星声(星){
  if(静音||!星||!数据[星.语言序])return;
  await 唤醒声音();
  if(!声音上下文)return;
  const 语言=数据[星.语言序];
  const 缓冲=await 取得音频(语言.code);
  if(!缓冲)return;
  const 源=声音上下文.createBufferSource();
  const 音量=声音上下文.createGain();
  const 方位=声音上下文.createStereoPanner?声音上下文.createStereoPanner():null;
  源.buffer=缓冲;
  const 现在=声音上下文.currentTime;
  const 时长=Math.min(1.8,Math.max(.28,缓冲.duration));
  const 起点=缓冲.duration>时长+.08?随机()*(缓冲.duration-时长-.05):0;
  音量.gain.setValueAtTime(.0001,现在);
  音量.gain.exponentialRampToValueAtTime(.18,现在+.045);
  音量.gain.setValueAtTime(.18,现在+Math.max(.08,时长-.12));
  音量.gain.exponentialRampToValueAtTime(.0001,现在+时长);
  if(方位){方位.pan.value=限制((星.x-宽/2)/(宽/2),-1,1);源.connect(音量);音量.connect(方位);方位.connect(声音上下文.destination);}else{源.connect(音量);音量.connect(声音上下文.destination);}
  源.start(现在,起点,时长);
}


function 曼荼罗偏移(角,星){
  if(!星||星.种类==='远星'||星.种类==='核心')return 0;
  const 相=星.花瓣偏||0,权=星.花瓣权重||1;
  const 八=Math.pow(Math.max(0,Math.cos(8*角+相*.09)),.58);
  const 十二=Math.pow(Math.max(0,Math.cos(12*角+相*.13)),.62);
  const 十六=Math.pow(Math.max(0,Math.cos(16*角+相*.17)),.70);
  let v=0;
  if(星.种类==='内环')v=十二*22-7+Math.sin(24*角+相)*2.4;
  else if(星.种类==='主环')v=八*40+十六*11-18+Math.sin(16*角+相)*4.2;
  else if(星.种类==='外环')v=八*58+十六*17-25+Math.sin(8*角+相)*7.8;
  else if(星.种类==='流线')v=八*32+Math.sin(12*角+相)*10-8;
  return v*权;
}
function 旋转点(x,y,a){const c=Math.cos(a),s=Math.sin(a);return{x:x*c-y*s,y:x*s+y*c};}
function 计算星位(星){
  if(星.种类==='远星'){
    星.前x=星.x;星.前y=星.y;
    星.x+=Math.sin(时间*.06+星.相位)*.006;
    星.y+=Math.cos(时间*.05+星.相位)*.003;
    星.深度=.2;星.切x=1;星.切y=0;return;
  }
  星.前x=星.x;星.前y=星.y;
  const 语言=数据[星.语言序]||{};
  const 语速=限制((语言.onset_rate||5)/10,.5,1.5);
  const 音高变化=限制((语言.f0_range||55)/120,.38,1.45);
  const 角=星.角+时间*星.速度*语速+Math.sin(时间*.14+星.相位)*.025;
  const 轨道波动=Math.sin(角*3+星.相位+时间*.18)*星.厚度*.34*音高变化;
  const 半径=星.轨道半径+轨道波动;
  const 花瓣偏移=曼荼罗偏移(角,星);
  const 曼半径=半径+花瓣偏移;
  const 厚度偏移=(Math.sin(时间*.33+星.相位)+Math.sin(角*7+星.相位)*.45)*星.厚度*.35;
  let lx=Math.cos(角)*(曼半径+厚度偏移);
  let ly=Math.sin(角)*(曼半径*星.扁率+厚度偏移*.45);
  if(星.种类==='核心'){
    lx+=Math.sin(时间*.8+星.相位*2)*星.厚度*.16;
    ly+=Math.cos(时间*.7+星.相位)*星.厚度*.13;
  }
  const p=旋转点(lx,ly,星.倾角);
  星.x=中心X+p.x;星.y=中心Y+p.y;
  const tx=-Math.sin(角)*曼半径;
  const ty=Math.cos(角)*曼半径*星.扁率;
  const t=旋转点(tx,ty,星.倾角);const td=Math.hypot(t.x,t.y)||1;
  星.切x=t.x/td;星.切y=t.y/td;
  星.深度=(Math.sin(角)+1)/2;
  if(指针.进入){
    const dx=星.x-指针.x,dy=星.y-指针.y,d=Math.hypot(dx,dy);
    if(d<66&&d>0){const 力=(1-d/66)*(指针.按下?10:6);星.x+=dx/d*力;星.y+=dy/d*力;}
  }
}

function 更新(dt){
  时间+=dt;帧数++;
  for(let i=0;i<语言脉冲.length;i++)语言脉冲[i]=Math.max(0,语言脉冲[i]-dt*.58);
  for(const 星 of 星点){计算星位(星);星.闪烁=Math.max(0,星.闪烁-dt*2.4);}
  for(let i=波纹.length-1;i>=0;i--){波纹[i].寿命-=dt;波纹[i].半径+=dt*波纹[i].速度;if(波纹[i].寿命<=0)波纹.splice(i,1);}
  for(let i=碎线.length-1;i>=0;i--){const s=碎线[i];s.寿命-=dt;s.x+=s.vx*dt;s.y+=s.vy*dt;s.vx*=.982;s.vy*=.982;if(s.寿命<=0)碎线.splice(i,1);}
  for(let i=碰撞.length-1;i>=0;i--){碰撞[i].寿命-=dt;if(碰撞[i].寿命<=0)碰撞.splice(i,1);}
  下一次碰撞-=dt;
  if(下一次碰撞<=0){制造微碰撞();下一次碰撞=.24+随机()*.55;}
  if(提示星点&&performance.now()>提示消失时间)提示星点=null;
}

function 制造微碰撞(){
  const 可用=星点.filter(s=>s.种类!=='远星');
  const a=可用[Math.floor(随机()*可用.length)];
  let b=null,最佳=44;
  for(let i=0;i<34;i++){
    const c=可用[Math.floor(随机()*可用.length)];
    if(c===a)continue;
    const d=Math.hypot(c.x-a.x,c.y-a.y);
    if(d<最佳&&d>4){最佳=d;b=c;}
  }
  if(!b)return;
  const x=(a.x+b.x)/2,y=(a.y+b.y)/2;
  碰撞.push({a,b,x,y,寿命:.58,总寿命:.58});
  波纹.push({x,y,半径:2,寿命:.68,总寿命:.68,速度:26,强度:.22});
  for(let i=0;i<3+Math.floor(随机()*5);i++)加入碎线(x,y,.18);
}
function 加入碎线(x,y,强=.4){
  const a=随机()*圆周,速=7+随机()*28*强;
  碎线.push({x,y,vx:Math.cos(a)*速,vy:Math.sin(a)*速,长:2+随机()*11,角:a,寿命:.35+随机()*.6,总寿命:.95,强});
}
function 触发星点(星,允许声音=true){
  if(!星)return;
  星.闪烁=1;当前星点=星;提示星点=星;提示消失时间=performance.now()+1800;
  if(语言脉冲.length)语言脉冲[星.语言序]=Math.min(1.5,语言脉冲[星.语言序]+.95);
  波纹.push({x:星.x,y:星.y,半径:3,寿命:1.15,总寿命:1.15,速度:45,强度:.8,语言序:星.语言序});
  for(let i=0;i<11;i++)加入碎线(星.x,星.y,.62);

function 寻找星点(x,y,半径=13){
  let 最佳=null,最佳距=半径;
  for(const 星 of 星点){
    if(星.种类==='远星')continue;
    const d=Math.hypot(x-星.x,y-星.y);
    const 命中=半径+星.大小*(.7+星.深度)*2.2;
    if(d<最佳距&&d<命中){最佳距=d;最佳=星;}
  }
  return 最佳;
}

function 星环投影(半径,角,扁率=.56,rot=主倾角){const p=旋转点(Math.cos(角)*半径,Math.sin(角)*半径*扁率,rot);return{x:中心X+p.x,y:中心Y+p.y};}
function 曼荼罗半径(基础,角,瓣数,幅度,相=0){const c=Math.pow(Math.max(0,Math.cos(瓣数*(角+相))),.58);return 基础+幅度*c-幅度*.22+Math.sin(瓣数*2*角+相)*幅度*.055;}
function 绘制曼荼罗路径(基础,扁率,瓣数,幅度,rot,alpha,width,相=0){

function 绘制花瓣层(瓣数,内半径,外半径,扁率,rot,alpha,width,相=0){

  for(const c of 碰撞){const p=c.寿命/c.总寿命;笔.strokeStyle=`rgba(232,241,245,${p*.22})`;笔.lineWidth=.45;笔.beginPath();笔.moveTo(c.a.x,c.a.y);const mx=c.x+Math.sin(时间*7+c.x)*8,my=c.y+Math.cos(时间*5+c.y)*4;笔.quadraticCurveTo(mx,my,c.b.x,c.b.y);笔.stroke();}
  for(const w of 波纹){const p=w.寿命/w.总寿命;笔.strokeStyle=`rgba(235,243,246,${p*(w.强度||.4)*.52})`;笔.lineWidth=.45+p*.8;笔.beginPath();笔.ellipse(w.x,w.y,w.半径,w.半径*.46,主倾角,0,圆周);笔.stroke();}
  for(const s of 碎线){const p=s.寿命/s.总寿命;笔.strokeStyle=`rgba(238,245,248,${p*.42})`;笔.lineWidth=.35;笔.beginPath();笔.moveTo(s.x,s.y);笔.lineTo(s.x-Math.cos(s.角)*s.长,s.y-Math.sin(s.角)*s.长);笔.stroke();}
  笔.restore();
}

function 椭圆位置(角,rx,ry,rot){const c=Math.cos(rot),s=Math.sin(rot),x=Math.cos(角)*rx,y=Math.sin(角)*ry;return{x:中心X+x*c-y*s,y:中心Y+x*s+y*c};}
function 绘制语言共振(){
  笔.save();笔.globalCompositeOperation='lighter';
  for(let i=0;i<语言脉冲.length;i++){
    const p=语言脉冲[i];if(p<=.01)continue;
    const a=i/语言脉冲.length*圆周+时间*.02;
    const p1=椭圆位置(a,252,148,主倾角);
    const p2=椭圆位置(a+Math.PI*.72,118,70,主倾角+.08);
    笔.strokeStyle=`rgba(235,244,247,${p*.13})`;笔.lineWidth=.45+p*.35;笔.beginPath();笔.moveTo(p1.x,p1.y);笔.bezierCurveTo(中心X+Math.cos(a)*55,中心Y-80,中心X+Math.sin(a)*42,中心Y+75,p2.x,p2.y);笔.stroke();
  }
  笔.restore();
}

function 绘制提示(){
  if(!提示星点||!显示文字)return;
  const d=数据[提示星点.语言序];if(!d)return;
  const x=限制(提示星点.x+14,42,宽-152),y=限制(提示星点.y-52,74,高-92);
  笔.save();笔.globalCompositeOperation='source-over';
  笔.fillStyle='rgba(0,0,0,.76)';笔.strokeStyle='rgba(221,235,241,.22)';笔.lineWidth=.5;圆角矩形(x,y,138,55,6);笔.fill();笔.stroke();
  笔.fillStyle='rgba(241,246,248,.90)';笔.font='600 10px "Microsoft YaHei","PingFang SC",sans-serif';笔.textAlign='left';笔.fillText(d.中文,x+10,y+15);
  笔.fillStyle='rgba(205,220,227,.55)';笔.font='6.5px "Microsoft YaHei","PingFang SC",sans-serif';笔.fillText(d.语系中文,x+10,y+27);
  笔.fillStyle='rgba(195,213,221,.48)';笔.font='6px "Microsoft YaHei","PingFang SC",sans-serif';
  笔.fillText(`平均基频 ${Math.round(d.mean_f0||0)} 赫兹`,x+10,y+39);
  笔.fillText(`样本 ${d.sample_count||0} 条｜停顿 ${Math.round((d.pause_ratio||0)*100)}%`,x+10,y+49);
  笔.restore();
}

function 绘制文字(){
  if(!显示文字)return;
  笔.save();笔.globalCompositeOperation='source-over';
  笔.textAlign='center';笔.fillStyle='rgba(238,244,247,.88)';笔.font='500 19px "Microsoft YaHei","PingFang SC",sans-serif';笔.fillText('共 振 星 图',宽/2,49);
  笔.fillStyle='rgba(205,219,226,.40)';笔.font='6.8px "Microsoft YaHei","PingFang SC",sans-serif';笔.fillText('音 声 相 和',宽/2,66);
  笔.strokeStyle='rgba(220,232,238,.14)';笔.lineWidth=.45;笔.beginPath();笔.moveTo(宽/2-96,76);笔.lineTo(宽/2+96,76);笔.stroke();
  笔.fillStyle='rgba(205,220,226,.34)';笔.font='6.2px "Microsoft YaHei","PingFang SC",sans-serif';笔.fillText('每一种语言都是星海中的一束振动',宽/2,806);笔.fillText('差异造就丰富　包容使声音彼此共振',宽/2,819);
  笔.fillStyle='rgba(185,204,213,.20)';笔.font='5.3px "Microsoft YaHei","PingFang SC",sans-serif';笔.fillText('33种语言、1609条人工核验语音的基频、节奏、停顿与频谱可视化',宽/2,846);
  笔.save();笔.translate(21,高/2);笔.rotate(-Math.PI/2);笔.textAlign='center';笔.fillStyle='rgba(180,199,208,.18)';笔.font='5.6px "Microsoft YaHei","PingFang SC",sans-serif';笔.fillText('基频｜节奏｜停顿｜频谱',0,0);笔.restore();
  笔.save();笔.translate(宽-21,高/2);笔.rotate(Math.PI/2);笔.textAlign='center';笔.fillStyle='rgba(180,199,208,.16)';笔.font='5.6px "Microsoft YaHei","PingFang SC",sans-serif';笔.fillText('交流｜互鉴｜融合｜共生',0,0);笔.restore();
  if(!声音已唤醒){笔.fillStyle='rgba(231,240,244,.45)';笔.font='7px "Microsoft YaHei","PingFang SC",sans-serif';笔.fillText('首次轻触任意星点，唤醒声音',宽/2,高/2+5);}
  if(静音){笔.fillStyle='rgba(225,236,241,.35)';笔.font='6px "Microsoft YaHei","PingFang SC",sans-serif';笔.fillText('声音已关闭',宽/2,88);}
  笔.restore();
}

function 绘制(){
  笔.setTransform(画布.width/宽,0,0,画布.height/高,0,0);
  轨迹笔.setTransform(轨迹画布.width/宽,0,0,轨迹画布.height/高,0,0);
  绘制背景();绘制放射束();绘制轨迹星海();笔.drawImage(轨迹画布,0,0,宽,高);绘制语言共振();绘制环();绘制碰撞与波纹();绘制提示();绘制文字();
}
function 循环(现在){const dt=Math.min(.04,Math.max(.001,(现在-上次时间)/1000));上次时间=现在;if(!暂停)更新(dt);绘制();requestAnimationFrame(循环);}

function 事件坐标(e){const r=画布.getBoundingClientRect();return{x:(e.clientX-r.left)/r.width*宽,y:(e.clientY-r.top)/r.height*高};}
function 处理触碰(e,强制=false){
  const p=事件坐标(e);指针.前x=指针.x;指针.前y=指针.y;指针.x=p.x;指针.y=p.y;指针.进入=true;
  const dx=指针.x-指针.前x,dy=指针.y-指针.前y;指针.速度=插值(指针.速度,Math.hypot(dx,dy)*60,.28);
  const 星=寻找星点(p.x,p.y,强制?20:12);
  const 现在=performance.now();
  if(星&&(强制||星.编号!==最近发声)&&(强制||现在-最近发声时间>260)){
    最近发声=星.编号;最近发声时间=现在;触发星点(星,true);
  }
  if(指针.速度>310&&现在-最近发声时间>90){波纹.push({x:p.x,y:p.y,半径:2,寿命:.48,总寿命:.48,速度:35,强度:.26});for(let i=0;i<3;i++)加入碎线(p.x,p.y,.2);}
}
画布.addEventListener('pointerenter',()=>指针.进入=true);
画布.addEventListener('pointerleave',()=>{指针.进入=false;当前星点=null;});
画布.addEventListener('pointermove',e=>{e.preventDefault();处理触碰(e,false);},{passive:false});
画布.addEventListener('pointerdown',async e=>{e.preventDefault();画布.setPointerCapture?.(e.pointerId);指针.按下=true;await 唤醒声音();处理触碰(e,true);},{passive:false});
画布.addEventListener('pointerup',e=>{e.preventDefault();指针.按下=false;},{passive:false});
画布.addEventListener('pointercancel',()=>指针.按下=false);
画布.addEventListener('dblclick',()=>重置());
window.addEventListener('resize',调整尺寸);
window.addEventListener('keydown',e=>{if(e.key==='s'||e.key==='S')保存();else if(e.key==='t'||e.key==='T')显示文字=!显示文字;else if(e.key==='m'||e.key==='M')静音=!静音;else if(e.key==='r'||e.key==='R')重置();else if(e.code==='Space'){e.preventDefault();暂停=!暂停;}});
function 重置(){波纹.length=0;碎线.length=0;碰撞.length=0;提示星点=null;最近发声=-1;for(let i=0;i<语言脉冲.length;i++)语言脉冲[i]=0;轨迹笔.clearRect(0,0,宽,高);}
function 保存(){const a=document.createElement('a');a.download='共振星图_曼荼罗椭圆星环版.png';a.href=画布.toDataURL('image/png');a.click();}
function 圆角矩形(x,y,w,h,r){笔.beginPath();笔.moveTo(x+r,y);笔.arcTo(x+w,y,x+w,y+h,r);笔.arcTo(x+w,y+h,x,y+h,r);笔.arcTo(x,y+h,x,y,r);笔.arcTo(x,y,x+w,y,r);笔.closePath();}
function 限制(v,a,b){return Math.max(a,Math.min(b,v));}function 插值(a,b,t){return a+(b-a)*t;}function 随机生成器(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;};}
调整尺寸();for(const 星 of 星点)计算星位(星);requestAnimationFrame(循环);
})();

</script>
